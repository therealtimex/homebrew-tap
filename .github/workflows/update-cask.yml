name: Update Cask Formula

# NOTE: GitHub Actions minimum cron interval is 5 minutes.
# The check is a lightweight API call when no new release exists — no downloads ever.
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      version:
        description: |
          Specific version to add/update (e.g. 1.0.61).
          Leave empty to auto-detect from recent releases.
        required: false
        type: string
      check_last_n:
        description: |
          When no version is specified, how many recent releases to check
          for missing casks (useful for backfilling). Default: 5, max: 20.
        required: false
        default: "5"
        type: string

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout tap repo
        uses: actions/checkout@v4

      # ---------------------------------------------------------------
      # 1. Figure out which versions need a cask update
      # ---------------------------------------------------------------
      - name: Resolve versions to process
        id: versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            echo "versions=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "Manually specified version: ${{ inputs.version }}"
            exit 0
          fi

          N="${{ inputs.check_last_n || '5' }}"
          echo "Checking last $N releases from therealtimex/realtimex ..."

          # Tags to skip (bad tags, unreleased major versions)
          SKIP_PATTERNS=(
            "^resources$"
            "^v2\."
          )

          TAGS=$(curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/therealtimex/realtimex/releases?per_page=${N}" \
            | jq -r '.[].tag_name')

          if [[ -z "$TAGS" ]]; then
            echo "No releases found or API error."
            echo "versions=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          FILTERED_TAGS=()
          for TAG in $TAGS; do
            SKIP=false
            for PATTERN in "${SKIP_PATTERNS[@]}"; do
              if [[ "$TAG" =~ $PATTERN ]]; then
                echo "  Skipping tag: $TAG (matches filter '$PATTERN')"
                SKIP=true
                break
              fi
            done
            [[ "$SKIP" == "false" ]] && FILTERED_TAGS+=("$TAG")
          done

          MISSING=()
          for TAG in "${FILTERED_TAGS[@]}"; do
            VERSION="${TAG#v}"
            if [[ ! -f "Casks/realtimex@${VERSION}.rb" ]]; then
              echo "  Missing cask for v${VERSION} -> will process"
              MISSING+=("$VERSION")
            else
              echo "  Cask exists for v${VERSION} -> skip"
            fi
          done

          echo "versions=${MISSING[*]}" >> "$GITHUB_OUTPUT"

      # ---------------------------------------------------------------
      # 2. For each missing version: read SHA256 from GitHub API, write casks
      #    No downloads — the digest field in the releases API has SHA256.
      # ---------------------------------------------------------------
      - name: Process missing versions
        if: steps.versions.outputs.versions != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSIONS: ${{ steps.versions.outputs.versions }}
        run: |
          chmod +x scripts/update_cask.sh

          # Track latest stable and dev separately for rolling casks
          LATEST_STABLE=""
          LATEST_STABLE_ARM=""
          LATEST_STABLE_INTEL=""
          LATEST_DEV=""
          LATEST_DEV_ARM=""
          LATEST_DEV_INTEL=""

          for VERSION in $VERSIONS; do
            echo "============================================"
            echo "Processing v${VERSION}"
            echo "============================================"

            ASSETS=$(curl -fsSL \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/therealtimex/realtimex/releases/tags/v${VERSION}" \
              | jq -r '.assets[] | "\(.name) \(.digest)"')

            ARM_SHA=$(echo "$ASSETS" \
              | grep -E "RealTimeX\.AI-${VERSION}-arm64\.dmg " \
              | awk '{print $2}' | sed 's/^sha256://')

            INTEL_SHA=$(echo "$ASSETS" \
              | grep -E "RealTimeX\.AI-${VERSION}\.dmg " \
              | awk '{print $2}' | sed 's/^sha256://')

            if [[ -z "$ARM_SHA" || -z "$INTEL_SHA" ]]; then
              echo "ERROR: Could not find DMG digests for v${VERSION}. Skipping."
              continue
            fi

            echo "ARM64  SHA256: $ARM_SHA"
            echo "Intel  SHA256: $INTEL_SHA"

            # Write pinned versioned cask
            scripts/update_cask.sh "realtimex@${VERSION}" "$VERSION" "$ARM_SHA" "$INTEL_SHA" "Casks"

            # Track latest per channel (dev vs stable)
            if [[ "$VERSION" == *"-dev" ]]; then
              LATEST_DEV="$VERSION"
              LATEST_DEV_ARM="$ARM_SHA"
              LATEST_DEV_INTEL="$INTEL_SHA"
            else
              LATEST_STABLE="$VERSION"
              LATEST_STABLE_ARM="$ARM_SHA"
              LATEST_STABLE_INTEL="$INTEL_SHA"
            fi
          done

          # Update rolling stable cask (realtimex.rb)
          if [[ -n "$LATEST_STABLE" ]]; then
            scripts/update_cask.sh "realtimex" "$LATEST_STABLE" "$LATEST_STABLE_ARM" "$LATEST_STABLE_INTEL" "Casks"
            echo "Stable rolling cask updated to v${LATEST_STABLE}"
          fi

          # Update rolling dev cask (realtimex-dev.rb)
          if [[ -n "$LATEST_DEV" ]]; then
            scripts/update_cask.sh "realtimex-dev" "$LATEST_DEV" "$LATEST_DEV_ARM" "$LATEST_DEV_INTEL" "Casks"
            echo "Dev rolling cask updated to v${LATEST_DEV}"
          fi

      # ---------------------------------------------------------------
      # 3. Commit and push if anything changed
      # ---------------------------------------------------------------
      - name: Commit and push
        if: steps.versions.outputs.versions != ''
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add Casks/

          if git diff --cached --quiet; then
            echo "No cask files changed. Nothing to commit."
            exit 0
          fi

          VERSIONS="${{ steps.versions.outputs.versions }}"
          VERSION_LIST=$(echo "$VERSIONS" | tr ' ' '\n' | sed 's/^/v/' | tr '\n' ' ' | sed 's/ $//')

          git commit -m "chore: add cask(s) for ${VERSION_LIST}"
          git push
